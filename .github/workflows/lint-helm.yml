name: Lint Helm charts

on:
  workflow_call:
    inputs:
      HELM_DOCS_VERSION:
        description: Version of helm-docs to use (eg. 'v1.14.2')
        required: false
        type: string
        default: v1.14.2
      CT_CONF_PATH:
        description: Path to the chart-testing configuration file
        required: true
        type: string
      LINT_CHARTS:
        description: Whether to run the chart linting job
        required: false
        type: boolean
        default: true
      LINT_DOCS:
        description: Whether to run the chart docs linting job
        required: false
        type: boolean
        default: true
      RUNS_ON:
        description: Runner labels as JSON array (e.g., '["ubuntu-24.04"]' or '["self-hosted", "linux"]')
        required: false
        type: string
        default: '["ubuntu-24.04"]'

permissions:
  contents: read

jobs:
  lint-charts:
    name: Lint charts
    runs-on: ${{ fromJSON(inputs.RUNS_ON) }}
    if: ${{ inputs.LINT_CHARTS }}
    steps:
    - name: Checks-out repository
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        fetch-depth: 0

    - name: Set up Helm
      uses: azure/setup-helm@1a275c3b69536ee54be43f2070a358922e12c8d4 # v4.3.1

    - name: Set up Python
      uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
      with:
        python-version: '3.13'
        check-latest: true

    - name: Set up chart-testing
      uses: helm/chart-testing-action@6ec842c01de15ebb84c8627d2744a0c2f2755c9f # v2.8.0

    - name: Run chart-testing (lint)
      run: ct lint --config ${{ inputs.CT_CONF_PATH }}

  lint-docs:
    name: Lint docs
    runs-on: ${{ fromJSON(inputs.RUNS_ON) }}
    if: ${{ inputs.LINT_DOCS }}
    steps:
    - name: Checks-out repository
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

    - name: Run helm-docs
      run: |
        set -euo pipefail

        echo "Validating helm chart docs"
        docker run \
          --rm \
          --volume "$(pwd)/charts:/helm-docs:ro" \
          -u $(id -u) \
          docker.io/jnorwood/helm-docs:${{ inputs.HELM_DOCS_VERSION }}
        echo "Helm chart docs are valid"
