name: Release app

on:
  workflow_call:
    inputs:
      ENABLE_PRERELEASE:
        description: Enable prerelease functionality
        type: boolean
        required: false
        default: false
      TAG_MAJOR_AND_MINOR:
        description: Tag major and minor versions
        type: boolean
        required: false
        default: false
      RELEASE_ASSET_PATHS:
        description: Comma-separated list of local file paths to upload as release assets (e.g., 'dist/app-linux-amd64,dist/app-darwin-amd64')
        type: string
        required: false
      RELEASE_ARTIFACT_NAMES:
        description: Artifact name or glob pattern matching one or more artifacts (uploaded by previous jobs via actions/upload-artifact) to download and attach to the release (e.g., 'my-binaries' or 'my-app-*')
        type: string
        required: false
      AUTOMERGE_PRERELEASE:
        description: Automatically merge the prerelease pull request
        type: boolean
        required: false
        default: false
      AUTOMERGE_RELEASE:
        description: Automatically merge the release pull request
        type: boolean
        required: false
        default: false
      PRERELEASE_BRANCH:
        description: Branch to create the prerelease on
        type: string
        required: false
        default: develop
      RELEASE_BRANCH:
        description: Branch to create the release on
        type: string
        required: false
        default: main
      REBASE_PRERELEASE_BRANCH:
        description: Rebase the prerelease branch on the release branch after the release is created
        type: boolean
        required: false
        default: false
      RELEASE_CONFIG_FILE:
        description: Release-please config file for release branch
        type: string
        required: false
        default: release-please-config.json
      RELEASE_MANIFEST_FILE:
        description: Release-please manifest file for release branch
        type: string
        required: false
        default: .release-please-manifest.json
      PRERELEASE_CONFIG_FILE:
        description: Release-please config file for prerelease branch
        type: string
        required: false
        default: release-please-config-rc.json
      PRERELEASE_MANIFEST_FILE:
        description: Release-please manifest file for prerelease branch
        type: string
        required: false
        default: .release-please-manifest-rc.json
      RUNS_ON:
        description: Runner labels as JSON array (e.g., '["ubuntu-24.04"]' or '["self-hosted", "linux"]')
        required: false
        type: string
        default: '["ubuntu-24.04"]'
    secrets:
      GH_PAT:
        description: GitHub Personal Access Token (needed for automerge)
        required: false
    outputs:
      release-created:
        description: Has the releease been created
        value: ${{ jobs.release.outputs.release-created }}
      version:
        description: Full semver value
        value: ${{ jobs.release.outputs.version }}
      major-tag:
        description: Major version tag
        value: ${{ jobs.release.outputs.major-tag }}
      minor-tag:
        description: Minor version tag
        value: ${{ jobs.release.outputs.minor-tag }}
      patch-tag:
        description: Patch version tag
        value: ${{ jobs.release.outputs.patch-tag }}

jobs:
  release:
    name: Create new release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
    outputs:
      release-created: ${{ steps.release.outputs.release_created }}
      version: ${{ steps.release.outputs.version }}
      major-tag: ${{ steps.release.outputs.major }}
      minor-tag: ${{ steps.release.outputs.minor }}
      patch-tag: ${{ steps.release.outputs.patch }}
    steps:
    - name: Checks-out repository
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

    - name: Release new version
      uses: googleapis/release-please-action@16a9c90856f42705d54a6fda1823352bdc62cf38 # v4.4.0
      id: release
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        target-branch: ${{ github.ref_name }}
        config-file: ${{ (github.ref_name == inputs.RELEASE_BRANCH && inputs.RELEASE_CONFIG_FILE) || (inputs.ENABLE_PRERELEASE && github.ref_name == inputs.PRERELEASE_BRANCH && inputs.PRERELEASE_CONFIG_FILE) || inputs.RELEASE_CONFIG_FILE }}
        manifest-file: ${{ (github.ref_name == inputs.RELEASE_BRANCH && inputs.RELEASE_MANIFEST_FILE) || (inputs.ENABLE_PRERELEASE && github.ref_name == inputs.PRERELEASE_BRANCH && inputs.PRERELEASE_MANIFEST_FILE) || inputs.RELEASE_MANIFEST_FILE }}

    - name: Download release artifacts
      if: ${{ steps.release.outputs.release_created && inputs.RELEASE_ARTIFACT_NAMES != '' }}
      uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3 # v8.0.0
      with:
        name: ${{ inputs.RELEASE_ARTIFACT_NAMES }}
        path: /tmp/release-artifacts/
        merge-multiple: true

    - name: Upload Additional Release Artifacts
      if: ${{ steps.release.outputs.release_created && (inputs.RELEASE_ASSET_PATHS != '' || inputs.RELEASE_ARTIFACT_NAMES != '') }}
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        TAG_NAME: ${{ steps.release.outputs.tag_name }}
        ARTIFACT_PATHS: ${{ inputs.RELEASE_ASSET_PATHS }}
      run: |
        FILES=()
        if [[ -n "$ARTIFACT_PATHS" ]]; then
          ARTIFACT_PATHS="${ARTIFACT_PATHS//[[:space:]]/}"
          IFS=',' read -ra PATHS <<< "$ARTIFACT_PATHS"
          for p in "${PATHS[@]}"; do
            [[ -z "$p" ]] && continue
            FILES+=("$p")
          done
        fi
        if [[ -d /tmp/release-artifacts ]]; then
          mapfile -d '' -t DOWNLOADED < <(find /tmp/release-artifacts -type f -print0)
          FILES+=("${DOWNLOADED[@]}")
        fi
        if [[ ${#FILES[@]} -gt 0 ]]; then
          gh release upload "$TAG_NAME" "${FILES[@]}"
        fi

    - name: Tag major and minor versions
      if: ${{ steps.release.outputs.release_created && inputs.TAG_MAJOR_AND_MINOR }}
      run: |
        git config user.name github-actions[bot]
        git config user.email github-actions[bot]@users.noreply.github.com
        git fetch --all --prune

        git tag -d v${{ steps.release.outputs.major }} || true
        git push origin :v${{ steps.release.outputs.major }} || true
        git tag -a v${{ steps.release.outputs.major }} -m "Release v${{ steps.release.outputs.major }}"
        git push origin v${{ steps.release.outputs.major }}

        git tag -d v${{ steps.release.outputs.major }}.${{ steps.release.outputs.minor }} || true
        git push origin :v${{ steps.release.outputs.major }}.${{ steps.release.outputs.minor }} || true
        git tag -a v${{ steps.release.outputs.major }}.${{ steps.release.outputs.minor }} -m "Release v${{ steps.release.outputs.major }}.${{ steps.release.outputs.minor }}"
        git push origin v${{ steps.release.outputs.major }}.${{ steps.release.outputs.minor }}

    - name: Synchronize release-please-rc manifest
      if: ${{ inputs.ENABLE_PRERELEASE && github.ref_name == inputs.RELEASE_BRANCH && !steps.release.outputs.release_created }}
      run: |
        git config user.name github-actions[bot]
        git config user.email github-actions[bot]@users.noreply.github.com
        git fetch --all --prune

        pr_branch=$(git branch -r | grep "release-please--branches--${{ github.ref_name }}" | sed 's|origin/||' | xargs)

        if [ -n "$pr_branch" ]; then
          echo "Synchronizing release-please-rc manifest for branch '$pr_branch'"

          git fetch origin $pr_branch
          git checkout $pr_branch

          if ! git diff --no-index --quiet ${{ inputs.RELEASE_MANIFEST_FILE }} ${{ inputs.PRERELEASE_MANIFEST_FILE }}; then
            echo "Files differ, updating release-please-rc manifest"

            cat ${{ inputs.RELEASE_MANIFEST_FILE }} > ${{ inputs.PRERELEASE_MANIFEST_FILE }}

            git add ${{ inputs.PRERELEASE_MANIFEST_FILE }}
            git commit --amend --no-edit
            git push --force-with-lease --force-if-includes
          else
            echo "No changes to release-please-rc manifest"
          fi
        else
          echo "No release-please branch found for branch '${{ github.ref_name }}', skipping synchronization"
        fi

    - name: Automerge release PR
      if: ${{ ((inputs.ENABLE_PRERELEASE && inputs.AUTOMERGE_PRERELEASE && github.ref_name == inputs.PRERELEASE_BRANCH) || (inputs.AUTOMERGE_RELEASE && github.ref_name == inputs.RELEASE_BRANCH)) && !steps.release.outputs.release_created }}
      env:
        GH_TOKEN: ${{ secrets.GH_PAT }}
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        GITHUB_REPOSITORY: ${{ github.repository }}
        GITHUB_REF_NAME: ${{ github.ref_name }}
      run: |
        if [ -n "$GH_TOKEN" ]; then
          echo "Using provided GitHub PAT for automerge"

          AUTOMERGE_ALLOWED=$(curl -s -H "Authorization: Bearer $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/$GITHUB_REPOSITORY" | jq '.allow_auto_merge')

          if [ "$AUTOMERGE_ALLOWED" == "true" ]; then
            echo "Auto-merge is enabled for repo '$GITHUB_REPOSITORY', setting up automerge gh flag"
            GH_EXTRA_ARGS="--auto"
          else
            echo "Auto-merge is not enabled for repo '$GITHUB_REPOSITORY', setting up admin gh flag"
            GH_EXTRA_ARGS="--admin"
          fi

          git config user.name github-actions[bot]
          git config user.email github-actions[bot]@users.noreply.github.com
          git fetch --all --prune

          pr_branch=$(git branch -r | grep "release-please--branches--$GITHUB_REF_NAME" | sed 's|origin/||' | xargs)
          if [ -n "$pr_branch" ]; then
            pr_number=$(gh pr list --head $pr_branch --json number --jq '.[0].number')

            echo "Merging PR #$pr_number ('$pr_branch' > '$GITHUB_REF_NAME')"

            gh pr merge $pr_number --rebase $GH_EXTRA_ARGS
          else
            echo "No release-please branch found for branch '$GITHUB_REF_NAME', skipping automerge"
          fi
        else
          echo "No GitHub PAT provided, skipping automerge"
        fi

    - name: Ensure ${{ inputs.PRERELEASE_BRANCH }} is up to date with ${{ inputs.RELEASE_BRANCH }}
      if: ${{ inputs.ENABLE_PRERELEASE && inputs.REBASE_PRERELEASE_BRANCH && github.ref_name == inputs.RELEASE_BRANCH && steps.release.outputs.release_created }}
      env:
        RELEASE_BRANCH: ${{ inputs.RELEASE_BRANCH }}
        PRERELEASE_BRANCH: ${{ inputs.PRERELEASE_BRANCH }}
      run: |
        set -euo pipefail
        git fetch origin "$RELEASE_BRANCH" "$PRERELEASE_BRANCH" || true

        if git ls-remote --exit-code --heads origin "$PRERELEASE_BRANCH" >/dev/null 2>&1; then
          echo "'$PRERELEASE_BRANCH' branch exists. Attempting rebase on $RELEASE_BRANCH..."

          git checkout "$PRERELEASE_BRANCH"
          git reset --hard "origin/$PRERELEASE_BRANCH"

          if git rebase "origin/$RELEASE_BRANCH"; then
            echo "Rebase successful. Pushing updated $PRERELEASE_BRANCH..."

            git push --force-with-lease origin "$PRERELEASE_BRANCH"
          else
            echo "Rebase failed due to conflicts. Aborting."

            git rebase --abort || true
            exit 1
          fi
        else
          echo "'$PRERELEASE_BRANCH' branch does not exist. Creating from $RELEASE_BRANCH..."

          git checkout -b "$PRERELEASE_BRANCH" "origin/$RELEASE_BRANCH"
          git push origin "$PRERELEASE_BRANCH"
        fi
