name: ArgoCD preview app

on:
  workflow_call:
    inputs:
      APP_URL_TEMPLATE:
        description: Template for the preview app URL (can include `<pr_number>` placeholder)
        required: true
        type: string
      PR_NUMBER:
        description: ID number of the PR used to deploy Argo-CD preview app
        required: true
        type: number
      ARGOCD_APP_NAME_TEMPLATE:
        description: Template for the Argo-CD application name
        required: true
        type: string
      ARGOCD_SYNC_PAYLOAD_TEMPLATE:
        description: Template
        required: true
        type: string
      ARGOCD_URL:
        description: URL of the Argo-CD server
        required: true
        type: string
    secrets:
      ARGOCD_TOKEN:
        description: Token used to re-deploy Argo-CD preview app
        required: true

jobs:
  preview-comment:
    name: Add comment with preview infos
    if: ${{ contains(github.event.pull_request.labels.*.name, 'preview') }}
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
    - name: Generate app url
      id: generate-url
      run: |
        echo "APP_URL=$(echo "$APP_URL_TEMPLATE" | sed "s|<pr_number>|$PR_NUMBER|g")" >> $GITHUB_OUTPUT
      env:
        APP_URL_TEMPLATE: ${{ inputs.APP_URL_TEMPLATE }}
        PR_NUMBER: ${{ inputs.PR_NUMBER }}

    - name: Comment PR
      uses: thollander/actions-comment-pull-request@24bffb9b452ba05a4f3f77933840a6a841d1b32b # v3.0.1
      with:
        message: |
          🤖 Hey !

          A preview of the application is available at: ${{ steps.generate-url.outputs.APP_URL }}

          *Please be patient, deployment may take a few minutes.*
        comment-tag: preview

  preview-sync:
    name: Redeploy preview app
    if: ${{ contains(github.event.pull_request.labels.*.name, 'preview') }}
    runs-on: ubuntu-latest
    permissions: {}
    steps:
    - name: Replace template fields
      id: feed-template
      run: |
        echo "ARGOCD_APP_NAME=$(echo "$ARGOCD_APP_NAME_TEMPLATE" | sed "s|<pr_number>|$PR_NUMBER|g")" >> $GITHUB_OUTPUT
        echo "ARGOCD_SYNC_PAYLOAD=$(echo "$ARGOCD_SYNC_PAYLOAD_TEMPLATE" | sed "s|<pr_number>|$PR_NUMBER|g")" >> $GITHUB_OUTPUT
      env:
        ARGOCD_APP_NAME_TEMPLATE: ${{ inputs.ARGOCD_APP_NAME_TEMPLATE }}
        ARGOCD_SYNC_PAYLOAD_TEMPLATE: ${{ inputs.ARGOCD_SYNC_PAYLOAD_TEMPLATE }}
        PR_NUMBER: ${{ inputs.PR_NUMBER }}

    - name: Deploy new image
      run: |
        set -e

        RESPONSE_CODE=$(curl -s -w "%{http_code}" -o >(RESPONSE_BODY=$(cat)) -X POST "$ARGOCD_URL/api/v1/applications/$ARGOCD_APP_NAME/sync" \
          -H "Content-Type: application/json" \
          -H "Authorization: Bearer $ARGOCD_TOKEN" \
          -d "$ARGOCD_SYNC_PAYLOAD")

        echo "HTTP response code: $RESPONSE_CODE"

        if [ "$RESPONSE_CODE" -ne 200 ]; then
          echo "Error: Non-200 HTTP response detected."
          echo "Response body: $RESPONSE_BODY"
          exit 1
        fi
      env:
        ARGOCD_URL: ${{ inputs.ARGOCD_URL }}
        ARGOCD_TOKEN: ${{ secrets.ARGOCD_TOKEN }}
        ARGOCD_APP_NAME: ${{ steps.feed-template.outputs.ARGOCD_APP_NAME }}
        ARGOCD_SYNC_PAYLOAD: ${{ steps.feed-template.outputs.ARGOCD_SYNC_PAYLOAD }}
      continue-on-error: true
