name: CI

on:
  pull_request:
    branches:
    - main

jobs:
  lint-commits:
    uses: ./.github/workflows/lint-commits.yml
    permissions:
      contents: read
      pull-requests: read

  lint-yaml:
    uses: ./.github/workflows/lint-yaml.yml
    permissions:
      contents: read
    with:
      CONFIG_FILE: ci/configs/yamllint.yaml
