name: CI

on:
  pull_request:
    branches:
    - main

jobs:
  path-filter:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      workflows: ${{ steps.filter.outputs.workflows }}
    steps:
    - name: Checks-out repository
      uses: actions/checkout@v6

    - name: Check updated files paths
      uses: dorny/paths-filter@v3
      id: filter
      with:
        filters: |
          workflows:
            - '.github/workflows/**'

  lint-commits:
    uses: ./.github/workflows/lint-commits.yml
    permissions:
      contents: read
      pull-requests: read

  lint-yaml:
    uses: ./.github/workflows/lint-yaml.yml
    if: ${{ needs.path-filter.outputs.workflows == 'true' }}
    needs:
    - path-filter
    permissions:
      contents: read
    with:
      CONFIG_FILE: ci/configs/yamllint.yaml
      SCAN_PATH: ./.github/workflows
